<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لینگو - معلم انگلیسی هوش مصنوعی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender: #EAE1F7;
    --lavender-deep: #C9B6EC;
    --mint: #D3F2E6;
    --mint-deep: #9FE0C4;
    --peach: #FFE7D6;
    --peach-deep: #FFC59B;
    --sky: #DCEEFB;
    --sky-deep: #A9D8F5;
    --cream: #FFFCF7;
    --plum: #4A3F5C;
    --plum-soft: #7A6E92;
    --shadow: 0 8px 24px rgba(150, 120, 200, 0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(160deg, var(--lavender) 0%, var(--sky) 45%, var(--mint) 100%);
    font-family: 'Vazirmatn', 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--plum);
  }

  /* Header */
  header {
    width: 100%;
    max-width: 560px;
    padding: 22px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .mascot {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, var(--peach-deep) 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    box-shadow: var(--shadow);
    flex-shrink: 0;
    animation: bob 3s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-5px) rotate(-4deg); }
  }
  .title-wrap h1 {
    font-family: 'Baloo 2', 'Vazirmatn', sans-serif;
    font-size: 1.4rem;
    margin: 0;
    color: var(--plum);
  }
  .title-wrap p {
    margin: 2px 0 0;
    font-size: 0.8rem;
    color: var(--plum-soft);
  }

  /* Level selector */
  .level-bar {
    width: 100%;
    max-width: 560px;
    padding: 0 20px 14px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
  }
  .level-btn {
    border: none;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.6);
    color: var(--plum-soft);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .level-btn.active {
    background: var(--plum);
    color: #fff;
    box-shadow: var(--shadow);
  }

  /* Chat area */
  .chat-shell {
    width: 100%;
    max-width: 560px;
    flex: 1;
    background: var(--cream);
    border-radius: 28px 28px 0 0;
    box-shadow: 0 -8px 30px rgba(150,120,200,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 60vh;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 20px;
    font-size: 0.95rem;
    line-height: 1.6;
    animation: pop-in 0.25s ease;
  }
  @keyframes pop-in {
    from { opacity: 0; transform: translateY(6px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--lavender);
    border-bottom-left-radius: 6px;
    color: var(--plum);
  }
  .msg.user {
    align-self: flex-end;
    background: var(--mint-deep);
    border-bottom-right-radius: 6px;
    color: #17513a;
    direction: rtl;
  }
  .msg.bot .en { font-family: 'Nunito', sans-serif; }
  .msg .corr {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed rgba(74,63,92,0.25);
    font-size: 0.82rem;
    color: #8a6a3f;
  }
  .typing {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--lavender);
    border-radius: 20px;
    border-bottom-left-radius: 6px;
  }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--plum-soft);
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }

  /* Input bar */
  .input-bar {
    display: flex;
    gap: 10px;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    background: var(--cream);
    border-top: 1px solid rgba(150,120,200,0.12);
  }
  .input-bar input {
    flex: 1;
    border: 2px solid var(--lavender);
    background: #fff;
    border-radius: 999px;
    padding: 12px 18px;
    font-size: 0.95rem;
    font-family: 'Vazirmatn', sans-serif;
    outline: none;
    color: var(--plum);
    direction: rtl;
  }
  .input-bar input:focus { border-color: var(--sky-deep); }
  .input-bar button {
    width: 46px; height: 46px;
    border: none;
    border-radius: 50%;
    background: var(--plum);
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .input-bar button:active { transform: scale(0.9); }
  .input-bar button:disabled { opacity: 0.5; }

  .welcome {
    text-align: center;
    padding: 10px 16px 4px;
    color: var(--plum-soft);
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<header>
  <div class="mascot">🦉</div>
  <div class="title-wrap">
    <h1>لینگو</h1>
    <p>معلم خصوصی زبان انگلیسی‌ات، همیشه اینجاست</p>
  </div>
</header>

<div class="level-bar" id="levelBar">
  <button class="level-btn active" data-level="beginner">🌱 مبتدی</button>
  <button class="level-btn" data-level="intermediate">🌿 متوسط</button>
  <button class="level-btn" data-level="advanced">🌳 پیشرفته</button>
</div>

<div class="chat-shell">
  <div class="messages" id="messages"></div>
  <div class="input-bar">
    <input type="text" id="userInput" placeholder="پیامت رو بنویس... (فارسی یا انگلیسی)" />
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const levelBar = document.getElementById('levelBar');

let level = 'beginner';
let history = [];

const levelLabels = {
  beginner: 'مبتدی (Beginner)',
  intermediate: 'متوسط (Intermediate)',
  advanced: 'پیشرفته (Advanced)'
};

const systemPrompt = () => `You are "Lingo" (لینگو), a warm, encouraging, patient AI English tutor for a Persian-speaking learner at ${levelLabels[level]} level. 

Rules:
- Keep replies SHORT (2-5 sentences max), friendly, and appropriate for a mobile chat bubble.
- If the learner writes in Persian, gently respond mostly in simple English matched to their level, then add a short Persian translation/explanation in parentheses.
- If the learner writes in English with mistakes, first give a short natural reply continuing the conversation, THEN on a new line starting with "✏️ اصلاح:" give a brief gentle correction in Persian explaining the main mistake (only if there is one; skip this line if the sentence was correct).
- Ask a follow-up question to keep the conversation going, to encourage practice.
- Use simple vocabulary and short sentences for beginner level; richer vocabulary and idioms for advanced level.
- Be warm, playful, and use occasional emoji, but don't overdo it.
- Never lecture at length; this is a conversation practice partner, not a grammar textbook.`;

function addMessage(role, html) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function formatBotReply(text) {
  // Split correction line if present
  const parts = text.split(/✏️\s*اصلاح:/);
  let html = `<div class="en">${escapeHtml(parts[0].trim())}</div>`;
  if (parts[1]) {
    html += `<div class="corr">✏️ اصلاح: ${escapeHtml(parts[1].trim())}</div>`;
  }
  return html;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML.replace(/\n/g, '<br>');
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;

  addMessage('user', escapeHtml(text));
  history.push({ role: 'user', content: text });

  addTyping();

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemPrompt(),
        messages: history
      })
    });
    const data = await response.json();
    removeTyping();

    const reply = (data.content || [])
      .map(b => b.type === 'text' ? b.text : '')
      .join('\n')
      .trim() || "ببخشید، یه لحظه مشکل پیش اومد. دوباره امتحان کن 🙏";

    addMessage('bot', formatBotReply(reply));
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTyping();
    addMessage('bot', '<div class="en">Oops! خطایی پیش اومد، لطفاً دوباره امتحان کن 🌧️</div>');
    console.error(err);
  }
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

levelBar.addEventListener('click', (e) => {
  const btn = e.target.closest('.level-btn');
  if (!btn) return;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  level = btn.dataset.level;
});

// Welcome message
addMessage('bot', formatBotReply("Hi there! 👋 I'm Lingo, your English practice buddy. Tell me about your day, or ask me anything! (سلام! من لینگو هستم، دوستِ تمرین انگلیسی‌ت. درباره‌ی روزت بگو یا هر سوالی داری بپرس!)"));
</script>
</body>
</html>
